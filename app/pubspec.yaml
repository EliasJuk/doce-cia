name: doce_cia
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter  
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
    - assets/icons/cookie_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  adaptive_icon_background: "#FF8094"
  adaptive_icon_foreground: assets/icons/app_icon.png

flutter_native_splash:
  color: "#FF8094"
  image: assets/icons/cookie_logo.png
  android: true
  ios: true
  web: false
  fullscreen: true
  android_12:
    color: "#FF8094"
    image: assets/icons/cookie_logo.png
    icon_background_color: "#FF8094"